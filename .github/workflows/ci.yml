name: Heart Disease ML Training CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Python version
        run: python --version

      - name: Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib scipy dagshub

      - name: Run MLflow Training
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          python modelling.py 150 4 0.1

      - name: Print latest run ID
        run: cat MLProject/latest_run_id.txt

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: heart-ml-artifacts
          path: |
            MLProject/confusion_matrix.png
            MLProject/latest_run_id.txt

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t heartdisease-model -f MLProject/Dockerfile .

      - name: Tag Docker Image
        run: |
          docker tag heartdisease-model ${{ secrets.DOCKER_USERNAME }}/heartdisease-model:latest

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/heartdisease-model:latest